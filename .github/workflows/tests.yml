name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: test_simplequeue
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_simplequeue
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, pdo_mysql, pdo_pgsql, redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=test_simplequeue
          MYSQL_USER: root
          MYSQL_PASSWORD: ''
          POSTGRES_DSN: pgsql:host=127.0.0.1;port=5432;dbname=test_simplequeue
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ''
          DB_DSN: mysql:host=127.0.0.1;port=3306;dbname=test_simplequeue
          DB_USER: root
          DB_PASSWORD: ''

  quality:
    runs-on: ubuntu-latest

    name: Quality gates

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, pdo_mysql, pdo_pgsql, redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer phpstan

      - name: Run PHPCS
        run: composer cs-check
